name: Update Profile

on:
  schedule:
    - cron: "0 0 * * 0"   # weekly, Sunday 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync to latest remote
        run: |
          git fetch origin
          git reset --hard origin/main

      - name: Generate snake
        uses: Platane/snk@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          github_user_name: tanat0
          outputs: |
            output/github-contribution-grid-snake.svg
            output/github-contribution-grid-snake-dark.svg?palette=github-dark

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate language stats
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_USER: tanat0
        run: python scripts/generate_stats.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ github-stats-dark.svg github-stats-light.svg
          git diff --cached --quiet && exit 0
          git commit -m "chore: update profile assets"
          git push
