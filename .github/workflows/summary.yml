name: Update Summary Cards

on:
  schedule:
    - cron: "0 3 * * *"   # daily at 03:00 UTC (same run as stats)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          # GH_PAT (repo scope) gives access to private repos —
          # this is why language charts will show more than just Python
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        with:
          USERNAME: tanat0
          BRANCH_NAME: main
          AUTO_PUSH: false

      - name: Commit
        uses: EndBug/add-and-commit@v9
        with:
          message: "chore: update summary cards"
          add: "profile-summary-card-output"
          pull_strategy: "--rebase"
